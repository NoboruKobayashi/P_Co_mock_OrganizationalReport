_schema-version: 3.3.0
ID: 202607_P_Co_mock_OrganizationalReport
description: A simple CAP project.
version: 1.0.0
modules:
- name: 202607_P_Co_mock_OrganizationalReport-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: 202607_P_Co_mock_OrganizationalReport-auth
  - name: 202607_P_Co_mock_OrganizationalReport-postgres
  - name: 202607_P_Co_mock_OrganizationalReport-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: 202607_P_Co_mock_OrganizationalReport-postgres-deployer
  type: nodejs
  path: gen/pg
  requires:
  - name: 202607_P_Co_mock_OrganizationalReport-postgres
  parameters:
    buildpack: nodejs_buildpack
    no-route: true
    no-start: true
    tasks:
    - command: npm start
      name: deploy-to-postgresql
- name: 202607_P_Co_mock_OrganizationalReport
  type: approuter.nodejs
  path: app/router
  requires:
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  - name: 202607_P_Co_mock_OrganizationalReport-auth
  - name: 202607_P_Co_mock_OrganizationalReport-destination
  provides:
  - name: app-api
    properties:
      app-protocol: ${protocol}
      app-uri: ${default-uri}
  parameters:
    disk-quota: 256M
    keep-existing-routes: true
    memory: 256M
- name: 202607_P_Co_mock_OrganizationalReport-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: 202607_P_Co_mock_OrganizationalReport-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - panasonicsforganizationalreportjobmonitoruiorganizationalreport.zip
      name: panasonicsforganizationalreportjobmonitoruiorganizationalreport
      target-path: resources/
- name: panasonicsforganizationalreportjobmonitoruiorganizationalreport
  type: html5
  path: app/job-monitor-ui_organizationalreport
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: 202607_P_Co_mock_OrganizationalReport-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
        redirect-uris:
        - https://*~{app-api/app-uri}/**
      tenant-mode: dedicated
      xsappname: 202607_P_Co_mock_OrganizationalReport-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
  requires:
  - name: app-api
- name: 202607_P_Co_mock_OrganizationalReport-postgres
  type: org.cloudfoundry.managed-service
  parameters:
    service: postgresql-db
    service-plan: development
- name: 202607_P_Co_mock_OrganizationalReport-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite
- name: 202607_P_Co_mock_OrganizationalReport-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: 202607_P_Co_mock_OrganizationalReport-html5-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
